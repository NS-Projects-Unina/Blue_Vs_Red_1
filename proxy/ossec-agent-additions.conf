<!-- ============================================================
     CONFIGURAZIONE AGENT – da aggiungere agli agent installati
     nei container "proxy" e "dvwa" (e opzionalmente "app").

     Il file agent si trova in:  /var/ossec/etc/ossec.conf
     dentro il container, oppure puoi montarlo via Dockerfile
     con COPY ossec-agent.conf /var/ossec/etc/ossec.conf

     Nota: il blocco <client> con l'IP del manager è già
     configurato dall'installer (WAZUH_MANAGER="wazuh.manager").
     Qui aggiungi SOLO i blocchi mancanti.
     ============================================================ -->

<ossec_config>

  <!-- ── LOG APACHE (access + error) ──────────────────────────── -->
  <!-- Proxy container: log SSL/Apache per Heartbleed -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>

  <!-- DVWA container: log PHP/Apache per file upload -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- Log di autenticazione (per sudo / su / privilege escalation) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>


  <!-- ── SYSCHECK (FIM sul singolo agent) ──────────────────────
       Ogni agent monitora le proprie directory locali.
       Il manager riceve gli eventi e applica le regole 100020-100024.
  ─────────────────────────────────────────────────────────────── -->
  <syscheck>
    <frequency>60</frequency>      <!-- check ogni 60 secondi -->
    <scan_on_start>yes</scan_on_start>

    <!-- DVWA agent: uploads -->
    <directories realtime="yes" report_changes="yes" check_all="yes">
      /var/www/html/hackable/uploads
    </directories>
    <directories realtime="yes" report_changes="yes" check_all="yes">
      /var/www/html/dvwa/hackable/uploads
    </directories>

    <!-- Entrambi gli agent: file auth critici -->
    <directories realtime="yes" report_changes="yes" check_all="yes">
      /etc/passwd
    </directories>
    <directories realtime="yes" report_changes="yes" check_all="yes">
      /etc/shadow
    </directories>
    <directories realtime="yes" report_changes="yes" check_all="yes">
      /etc/sudoers
    </directories>
    <directories realtime="yes" check_all="yes">
      /usr/bin/sudo
    </directories>
    <directories realtime="yes" check_all="yes">
      /bin/su
    </directories>
    <directories realtime="yes" report_changes="yes">
      /var/spool/cron
    </directories>

    <ignore>/proc</ignore>
    <ignore>/sys</ignore>
    <ignore>/dev</ignore>
  </syscheck>


  <!-- ── ROOTCHECK ─────────────────────────────────────────────
       Controlla rootkit e configurazioni insicure
  ─────────────────────────────────────────────────────────────── -->
  <rootcheck>
    <disabled>no</disabled>
    <frequency>600</frequency>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
  </rootcheck>

</ossec_config>
