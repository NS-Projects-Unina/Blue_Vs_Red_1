
<ossec_config>

  <!-- ── LOG APACHE (access + error) ──────────────────────────── -->
  <!-- Proxy container: log SSL/Apache per Heartbleed -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>

  <!-- DVWA container: log PHP/Apache per file upload -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- Log di autenticazione (per sudo / su / privilege escalation) -->
  <!-- Intercetta sudo dal journal (funziona senza rsyslog) -->
  <localfile>
    <log_format>full_command</log_format>
    <command>journalctl -n 50 --no-pager -q _COMM=sudo 2>/dev/null || \
      grep -a "sudo\|su:" /var/log/syslog 2>/dev/null || echo "no_sudo_log"</command>
    <alias>sudo-journal-monitor</alias>
    <frequency>30</frequency>
  </localfile>

  <!-- Fallback: legge wtmp/last per cambi utente -->
  <localfile>
    <log_format>full_command</log_format>
    <command>last -n 10 -F 2>/dev/null</command>
    <alias>last-login-monitor</alias>
    <frequency>60</frequency>
  </localfile>


  <!-- ── SYSCHECK (FIM sul singolo agent) ──────────────────────
       Ogni agent monitora le proprie directory locali.
       Il manager riceve gli eventi e applica le regole 100020-100024.
  ─────────────────────────────────────────────────────────────── -->
  <syscheck>
    <frequency>60</frequency>      <!-- check ogni 60 secondi -->
    <scan_on_start>yes</scan_on_start>

    <!-- DVWA agent: uploads -->
    <directories realtime="yes" report_changes="yes" check_all="yes">
      /var/www/html/hackable/uploads
    </directories>
    <directories realtime="yes" report_changes="yes" check_all="yes">
      /var/www/html/dvwa/hackable/uploads
    </directories>

    <!-- Entrambi gli agent: file auth critici -->
    <directories realtime="yes" report_changes="yes" check_all="yes">
      /etc/passwd
    </directories>
    <directories realtime="yes" report_changes="yes" check_all="yes">
      /etc/shadow
    </directories>
    <directories realtime="yes" report_changes="yes" check_all="yes">
      /etc/sudoers
    </directories>
    <directories realtime="yes" check_all="yes">
      /usr/bin/sudo
    </directories>
    <directories realtime="yes" check_all="yes">
      /bin/su
    </directories>
    <directories realtime="yes" report_changes="yes">
      /var/spool/cron
    </directories>

    <ignore>/proc</ignore>
    <ignore>/sys</ignore>
    <ignore>/dev</ignore>
  </syscheck>


  <!-- ── ROOTCHECK ─────────────────────────────────────────────
       Controlla rootkit e configurazioni insicure
  ─────────────────────────────────────────────────────────────── -->
  <rootcheck>
    <disabled>no</disabled>
    <frequency>600</frequency>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
  </rootcheck>


  <!-- ── WODLE: COMMAND (check connessioni attive) ─────────────
       Esegue netstat ogni 60s e logga: utile per rilevare
       connessioni verso porte insolite (scanning in uscita).
  ─────────────────────────────────────────────────────────────── -->
  
  <wodle name="command">
    <disabled>no</disabled>
    <tag>netstat-monitor</tag>
    <command>netstat -tnp 2>/dev/null | grep ESTABLISHED | grep -E "apache|www-data|httpd|php"</command>
    <interval>30s</interval>
    <ignore_output>no</ignore_output>
    <run_on_start>yes</run_on_start>
    <timeout>30</timeout>
  </wodle>

</ossec_config>
