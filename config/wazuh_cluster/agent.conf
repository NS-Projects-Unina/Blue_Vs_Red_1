<!--
  Wazuh Centralized Agent Configuration
  Il manager distribuisce questo file a tutti gli agent registrati.
  Path nel manager: /var/ossec/etc/shared/default/agent.conf
  Aggiungilo come volume nel wazuh.manager nel docker-compose.yml:
    - ./config/wazuh_cluster/agent.conf:/var/ossec/etc/shared/default/agent.conf
-->

<agent_config name="dvwa">

  <!-- FIM real-time sulla cartella upload -->
  <syscheck>
    <frequency>300</frequency>
    <alert_new_files>yes</alert_new_files>
    <directories check_all="yes" realtime="yes" report_changes="yes">
      /var/www/html/hackable/uploads
    </directories>
    <directories check_all="yes" realtime="yes">
      /var/www/html/config
    </directories>
    <directories check_all="yes">
      /etc/passwd,/etc/shadow,/etc/sudoers
    </directories>
    <ignore>/var/www/html/hackable/uploads/dvwa_email.png</ignore>
  </syscheck>

  <!-- Apache access log → scanning + upload -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <!-- Apache error log → Heartbleed errors -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>

  <!-- auth.log → sudo/su escalation -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- auditd → SUID abuse, lettura /etc/shadow -->
  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

</agent_config>


<agent_config name="proxy">

  <!-- FIM sui certificati SSL: rileva sostituzioni post-compromissione -->
  <syscheck>
    <frequency>300</frequency>
    <alert_new_files>yes</alert_new_files>
    <directories check_all="yes" realtime="yes">
      /etc/ssl/certs
    </directories>
    <directories check_all="yes" realtime="yes">
      /etc/nginx
    </directories>
  </syscheck>

  <!-- nginx access log → scanning -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>

  <!-- nginx error log → Heartbleed (100400, 100403) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>

  <!-- syslog → anomalie SSL/TLS a livello kernel -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

</agent_config>


<agent_config name="app">

  <!-- FIM sul codice Flask: rileva modifiche post-compromissione -->
  <syscheck>
    <frequency>300</frequency>
    <alert_new_files>yes</alert_new_files>
    <directories check_all="yes" realtime="yes">
      /app
    </directories>
    <directories check_all="yes">
      /etc/passwd,/etc/shadow
    </directories>
  </syscheck>

  <!-- auth.log → sudo/su escalation -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

</agent_config>