version: "3.8"

# ============================================================
#  RED TEAM 
# ============================================================
services:
  ctf-server:
    build: 
      context: .
      dockerfile: HTTP-Dockerfile
    container_name: ctf-httpserver
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      ctf-net:
        ipv4_address: 10.10.0.10
      hidden-net:
        ipv4_address: 10.20.0.10

  ctf-db:
    build:
      context: .
      dockerfile: Dockerfile-db
    container_name: ctf-db
    restart: unless-stopped
    networks:
      hidden-net:
        ipv4_address: 10.20.0.20

# ============================================================
#  BLUE TEAM 
# ============================================================
  snort:
      build: ./snort
      container_name: snort
      restart: unless-stopped
      cap_add: [NET_ADMIN, NET_RAW]
      networks:
        ctf-net:
          ipv4_address: 10.10.0.50
        hidden-net:
          ipv4_address: 10.20.0.50
        mgmt-net:
          ipv4_address: 10.30.0.10
      volumes:
        - snort-logs:/var/log/snort

  wazuh-agent:
    build: ./wazuh-agent
    container_name: wazuh-agent
    restart: unless-stopped
    networks:
      mgmt-net:
        ipv4_address: 10.30.0.11
    volumes:
      - snort-logs:/var/log/snort:ro
    depends_on: [snort, wazuh-manager]

  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.0
    platform: linux/amd64
    container_name: wazuh-manager
    hostname: wazuh.manager
    restart: unless-stopped
    networks:
      mgmt-net:
        ipv4_address: 10.30.0.12
    ports: ["1514:1514/udp", "1515:1515", "55000:55000"]
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - wazuh-manager-data:/var/ossec/data
      - ./config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager.pem:/etc/ssl/filebeat.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key
      - ./config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.0
    platform: linux/amd64
    container_name: wazuh.indexer
    hostname: wazuh.indexer
    restart: unless-stopped
    networks:
      mgmt-net:
        ipv4_address: 10.30.0.13
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - bootstrap.memory_lock=true
    ulimits:
      memlock: {soft: -1, hard: -1}
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.key
      - ./config/wazuh_indexer_ssl_certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.pem
      - ./config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem
      - ./config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/certs/admin-key.pem
      - ./config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/opensearch.yml
      - ./config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml
    healthcheck:
      test: ["CMD-SHELL", "curl -k -u admin:SecretPassword https://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
  
  wazuh-init:
    image: wazuh/wazuh-indexer:4.7.0
    platform: linux/amd64
    container_name: wazuh-init
    networks:
      mgmt-net:
        ipv4_address: 10.30.0.15
    volumes:
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem
      - ./config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem
      - ./config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/certs/admin-key.pem
    depends_on:
      wazuh-indexer:
        condition: service_healthy
    command: >
      bash -c "
        chmod +x /usr/share/wazuh-indexer/plugins/opensearch-security/tools/securityadmin.sh &&
        export JAVA_HOME=/usr/share/wazuh-indexer/jdk &&
        /usr/share/wazuh-indexer/plugins/opensearch-security/tools/securityadmin.sh
        -cd /usr/share/wazuh-indexer/opensearch-security/
        -nhnv
        -cacert /usr/share/wazuh-indexer/certs/root-ca.pem
        -cert /usr/share/wazuh-indexer/certs/admin.pem
        -key /usr/share/wazuh-indexer/certs/admin-key.pem
        -h 10.30.0.13
      "
    restart: on-failure

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.0
    platform: linux/amd64
    container_name: wazuh-dashboard
    hostname: wazuh.dashboard
    restart: unless-stopped
    networks:
      mgmt-net:
        ipv4_address: 10.30.0.14
    ports: ["5601:5601"]
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - ./config/wazuh_indexer_ssl_certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem
      - ./config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
    depends_on: [wazuh-indexer, wazuh-manager]


# ============================================================
networks:
  ctf-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
        
  hidden-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.20.0.0/24

  mgmt-net:
      driver: bridge
      ipam:
        config:
          - subnet: 10.30.0.0/24

# ============================================================
volumes:
  snort-logs:
  wazuh-manager-data:
  wazuh-indexer-data: